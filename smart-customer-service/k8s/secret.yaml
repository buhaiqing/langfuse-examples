apiVersion: v1
kind: Secret
metadata:
  name: smart-cs-secrets
type: Opaque
stringData:
  # API Key
  SERVICE_API_KEYS: "sk-prod-xxx,sk-prod-yyy"
  
  # OpenAI API Key
  OPENAI_API_KEY: "sk-xxx"
  
  # Redis 密码
  REDIS_PASSWORD: "redis-password"
  
  # Langfuse 配置
  LANGFUSE_PUBLIC_KEY: "pk-lf-xxx"
  LANGFUSE_SECRET_KEY: "sk-lf-xxx"
  LANGFUSE_HOST: "https://cloud.langfuse.com"
