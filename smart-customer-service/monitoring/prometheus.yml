# Prometheus 监控配置

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # 智能客服系统
  - job_name: 'smart-customer-service'
    static_configs:
      - targets: ['smart-cs-api:8000']
    metrics_path: '/metrics'
    scrape_interval: 10s
  
  # Redis
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
  
  # FastAPI 应用指标
  - job_name: 'fastapi'
    static_configs:
      - targets: ['smart-cs-api:8000']
    metrics_path: '/metrics'

# 告警规则
rule_files:
  - "alerts.yml"

# Alertmanager 配置
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093
