version: '3.8'

services:
  # ==================== API 服务 ====================
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smart-cs-api
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=smart_cs
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./data/chroma:/app/data/chroma
    networks:
      - smart-cs-network
    restart: unless-stopped

  # ==================== Redis ====================
  redis:
    image: redis:7-alpine
    container_name: smart-cs-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smart-cs-network
    restart: unless-stopped

  # ==================== PostgreSQL ====================
  postgres:
    image: postgres:14-alpine
    container_name: smart-cs-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=smart_cs
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backend/db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smart-cs-network
    restart: unless-stopped

  # ==================== ChromaDB ====================
  chromadb:
    image: chromadb/chroma:latest
    container_name: smart-cs-chromadb
    ports:
      - "8001:8000"
    volumes:
      - chroma-data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smart-cs-network
    restart: unless-stopped

  # ==================== MinIO ====================
  minio:
    image: minio/minio:latest
    container_name: smart-cs-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smart-cs-network
    restart: unless-stopped

networks:
  smart-cs-network:
    driver: bridge

volumes:
  redis-data:
  postgres-data:
  chroma-data:
  minio-data:
