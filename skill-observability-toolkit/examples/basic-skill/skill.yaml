name: basic-tracing-skill
version: 1.0.0
description: A basic example skill demonstrating STOP Protocol tracing
tags:
  - example
  - tracing
  - basic

# Standard Operating Procedure
sop: |
  Step 1: Read input data from the specified file
  Step 2: Process the content (e.g., count words, analyze structure)
  Step 3: Generate output results
  Step 4: Validate output and record to trace

# Input parameters
inputs:
  - name: input_file
    type: string
    description: Path to input file to process
    required: true
    default: ""

  - name: process_type
    type: string
    description: Type of processing to apply
    required: false
    default: "count"
    enum:
      - count
      - analyze
      - transform

# Output definitions
outputs:
  - name: result
    type: object
    description: Processing result
    properties:
      success:
        type: boolean
        description: Whether processing succeeded
      stats:
        type: object
        description: Processing statistics
        properties:
          word_count:
            type: integer
            description: Number of words processed
          char_count:
            type: integer
            description: Number of characters processed
          duration_ms:
            type: integer
            description: Processing duration in milliseconds

# Tools used (simulated - would be actual tools in production)
tools_used:
  - name: file_reader
    version: "1.0"
    description: Read file from disk

  - name: text_processor
    version: "1.0"
    description: Process text content

# Assertions for validation
assertions:
  pre:
    - check: file_exists
      path: "${inputs.input_file}"
      message: "Input file must exist"
    - check: string_not_empty
      condition: "${inputs.input_file} != ''"
      message: "Input file path cannot be empty"
    - check: input_valid
      condition: "${inputs.process_type} in ['count', 'analyze', 'transform']"
      message: "Process type must be one of: count, analyze, transform"

  post:
    - check: output.exists
      path: "${outputs.result}"
      message: "Result must exist"
    
    - check: output.success
      condition: "${outputs.result.success} == true"
      message: "Processing must succeed"
    
    - check: output.not_empty
      path: "${outputs.result.stats.word_count}"
      message: "Word count must be provided"
    
    - check: performance
      metric: duration
      less_than: 10000
      message: "Processing must complete within 10 seconds"

# Trust Score configuration
trust_score:
  enabled: true
  history_window: 30  # days
  min_pass_rate: 0.8  # 80% of assertions must pass

# Metadata
metadata:
  skill_category: "data-processing"
  difficulty_level: "beginner"
  average_duration_ms: 500
  success_rate: 0.98
  examples:
    - name: "Process text file"
      inputs:
        input_file: "data.txt"
        process_type: "count"
    - name: "Analyze text structure"
      inputs:
        input_file: "document.md"
        process_type: "analyze"
