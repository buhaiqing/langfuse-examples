# Valid SKILL YAML fixture for testing
# Added comprehensive assertions for testing various assertion types

name: test-skill
version: 1.0.0
description: A test skill with comprehensive assertions for testing

tags:
  - testing
  - assertions
  - validation

sop: |
  Step 1: Validate inputs using pre-execution assertions
  Step 2: Execute the skill logic
  Step 3: Validate outputs using post-execution assertions
  Step 4: Calculate Trust Score based on assertion results

inputs:
  - name: input_data
    type: string
    description: Input data to process
    required: true
    default: ""
  
  - name: process_type
    type: string
    description: Type of processing to perform
    required: true
    default: "count"
    
  - name: threshold
    type: integer
    description: Threshold value for processing
    required: false
    default: 100

outputs:
  - name: result
    type: object
    description: Processing result
    properties:
      success:
        type: boolean
        description: Whether processing succeeded
      stats:
        type: object
        properties:
          word_count:
            type: integer
            description: Number of words
          char_count:
            type: integer
            description: Number of characters

tools_used:
  - name: process
    version: "1.0"
    description: Process input data

assertions:
  pre:
    # Input validation checks
    - check: string_not_empty
      path: "${inputs.input_data}"
      message: "Input data cannot be empty"
    
    - check: value_in_range
      path: "${inputs.threshold}"
      min_val: 0
      max_val: 1000
      message: "Threshold must be between 0 and 1000"
    
    - check: value_not_equal
      path: "${inputs.threshold}"
      expected: 0
      message: "Threshold cannot be zero"
    
    - check: type_is
      path: "${inputs.process_type}"
      expected_type: "str"
      message: "Process type must be a string"
    
    - check: key_exists
      data: "${inputs}"
      key: "input_data"
      message: "input_data key is required"
    
    # Conditional checks
    - check: string_not_empty
      condition: "${inputs.process_type} != ''"
      message: "Process type cannot be empty"
    
    - check: value_greater_than
      path: "${inputs.threshold}"
      threshold: 10
      message: "Threshold must be greater than 10 for valid processing"

  post:
    # Output validation checks
    - check: output_exists
      path: "${outputs.result}"
      message: "Result must exist"
    
    - check: output_not_empty
      path: "${outputs.result}"
      message: "Result cannot be empty"
    
    - check: output_success
      path: "${outputs.result}"
      message: "Processing must succeed"
    
    - check: key_exists
      data: "${outputs.result.stats}"
      key: "word_count"
      message: "Word count must be in result stats"
    
    - check: value_greater_than
      path: "${outputs.result.stats.word_count}"
      threshold: 0
      message: "Word count must be greater than 0"
    
    - check: value_less_than
      path: "${outputs.result.stats.char_count}"
      threshold: 10000
      message: "Character count must be reasonable"
    
    - check: performance
      duration_ms: "${metadata.processing_time_ms}"
      threshold_ms: 30000
      message: "Processing must complete within 30 seconds"
    
    - check: cost_within_budget
      cost: "${metadata.tokens_used}"
      budget: 5000
      message: "Token usage must be within budget"

trust_score:
  enabled: true
  history_window: 30
  min_pass_rate: 0.8
  min_assertions: 5

metadata:
  test: true
  category: "validation-test"
  difficulty_level: "intermediate"
  average_duration_ms: 5000
  success_rate: 0.95
