# Invalid skill manifest examples for testing error handling

---


## Invalid Example 1: Missing required fields

This file is missing the required "sop" field.

```yaml
name: incomplete-skill
version: 1.0.0
description: This manifest is intentionally incomplete
```

---


## Invalid Example 2: Empty required fields

This file has empty required fields which should fail validation.

```yaml
name: ""
version: " "
description: This has empty required fields

sop: |
  This SOP is valid but other fields are empty
```

---


## Invalid Example 3: Duplicate input names

This file has duplicate input parameter names.

```yaml
name: duplicate-inputs-skill
version: 1.0.0
description: Duplicate input names test

sop: |
  Step 1: Do something

inputs:
  - name: data
    type: string
    description: First input
  - name: data  # Duplicate!
    type: object
    description: Second input with same name
```

---


## Invalid Example 4: Empty assertions

This file has assertions without required fields.

```yaml
name: invalid-assertions-skill
version: 1.0.0
description: Invalid assertion test

sop: |
  Step 1: Do something

assertions:
  pre:
    - check: ""  # Empty check name
      message: ""
    - check: file_exists  # Missing message
```

---


## Invalid Example 5: Invalid assertion type

This file has assertions with invalid type values.

```yaml
name: invalid-type-skill
version: 1.0.0
description: Invalid assertion type test

sop: |
  Step 1: Do something

assertions:
  pre:
    - check: file_exists
      message: "Valid pre-check"
  post:
    - check: output_success
      message: "Valid post-check"
  invalid:  # Invalid type
    - check: bad_check
      message: "This is invalid"
```

---


## Invalid Example 6: Missing name

Name is a required field but is missing.

```yaml
version: 1.0.0
description: Missing name field

sop: |
  Step 1: Do something
```

---


## Invalid Example 7: Missing version

Version is a required field but is missing.

```yaml
name: missing-version-skill
description: Missing version field

sop: |
  Step 1: Do something
```

---


## Invalid Example 8: Invalid data types

This file has incorrectly typed values.

```yaml
name: invalid-types-skill
version: 123  # Should be string, not integer
description: Invalid type test

sop: true  # Should be string

inputs: "not-a-list"  # Should be a list

outputs:
  - name: result
    type: string
    description: Valid output

tools_used: "also-not-a-list"  # Should be a list

assertions:
  pre:
    - check: file_exists
      message: "Valid"
```
